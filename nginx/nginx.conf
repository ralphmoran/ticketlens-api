# Production nginx config — TLS termination + PHP-FPM proxy
# Set SERVER_NAME to your domain before deploying (or replace placeholder below).
# SSL cert paths are mounted as Docker volumes — see docker-compose.prod.yml.

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name YOUR_DOMAIN_HERE;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    http2 on;
    server_name YOUR_DOMAIN_HERE;

    ssl_certificate     /etc/ssl/certs/ticketlens.crt;
    ssl_certificate_key /etc/ssl/private/ticketlens.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    root /var/www/html/public;
    index index.php;

    client_max_body_size 20M;

    # Security headers
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "no-referrer-when-downgrade" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass  app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME    $document_root$fastcgi_script_name;
        include       fastcgi_params;

        # Pass real client IP and protocol so Laravel's trustProxies works correctly
        fastcgi_param REMOTE_ADDR              $remote_addr;
        fastcgi_param HTTP_X_FORWARDED_FOR     $proxy_add_x_forwarded_for;
        fastcgi_param HTTP_X_FORWARDED_PROTO   $scheme;
        fastcgi_param HTTP_X_REAL_IP           $remote_addr;
        fastcgi_read_timeout 300s;
    }

    # Reverb WebSocket — proxy upgrade to the reverb service on port 8080
    location /app/ {
        proxy_pass         http://reverb:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Block access to hidden files except .well-known
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Static assets — long cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Vite build assets (hashed filenames — immutable)
    location /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
