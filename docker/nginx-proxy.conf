map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# --- API subdomain: /v1, /webhooks, /up only. Root redirects to landing. ---
server {
    listen 80;
    server_name api.ticketlens.test;
    resolver 127.0.0.11 valid=30s ipv6=off;

    location = / {
        return 302 http://ticketlens.test/;
    }

    location /v1/       { proxy_pass http://laravel.test:80; include /etc/nginx/conf.d/_proxy-headers.conf; }
    location /webhooks/ { proxy_pass http://laravel.test:80; include /etc/nginx/conf.d/_proxy-headers.conf; }
    location = /up      { proxy_pass http://laravel.test:80; include /etc/nginx/conf.d/_proxy-headers.conf; }

    location / { return 404; }
}

# --- Primary hostname: static landing + Laravel Console + Vite assets ---
server {
    listen 80 default_server;
    server_name ticketlens.test;
    resolver 127.0.0.11 valid=30s ipv6=off;

    root /usr/share/nginx/html;
    index index.html;

    # Laravel Console (Inertia) — all console/* paths
    location /console  { proxy_pass http://laravel.test:80; include /etc/nginx/conf.d/_proxy-headers.conf; }

    # Vite dev assets + HMR (served by Vite inside laravel.test container on :5173)
    location /@vite/      { proxy_pass http://laravel.test:5173; include /etc/nginx/conf.d/_proxy-headers.conf; }
    location /@id/        { proxy_pass http://laravel.test:5173; include /etc/nginx/conf.d/_proxy-headers.conf; }
    location /@fs/        { proxy_pass http://laravel.test:5173; include /etc/nginx/conf.d/_proxy-headers.conf; }
    location /@react-refresh { proxy_pass http://laravel.test:5173; include /etc/nginx/conf.d/_proxy-headers.conf; }
    location /resources/  { proxy_pass http://laravel.test:5173; include /etc/nginx/conf.d/_proxy-headers.conf; }
    location /node_modules/ { proxy_pass http://laravel.test:5173; include /etc/nginx/conf.d/_proxy-headers.conf; }
    # Vite HMR WebSocket
    location /vite-ws     { proxy_pass http://laravel.test:5173; include /etc/nginx/conf.d/_proxy-headers.conf; }
    # Production build assets (if ever used) — stays on Laravel
    location /build/      { proxy_pass http://laravel.test:80; include /etc/nginx/conf.d/_proxy-headers.conf; }

    # Static landing for / and any other path with a matching file
    location / {
        try_files $uri $uri/ =404;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
